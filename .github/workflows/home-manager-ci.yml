name: Home Manager CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  list-configs:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Discover homeConfigurations
        id: discover
        run: |
          echo "configs=$(nix eval .#homeConfigurations --apply 'builtins.attrNames' --json)" >> "$GITHUB_OUTPUT"

  build:
    needs: list-configs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.list-configs.outputs.configs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build ${{ matrix.config }}
        run: |
          nix build ".#homeConfigurations.${{ matrix.config }}.activationPackage"
